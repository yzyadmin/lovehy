<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码烟花 - 我爱你何儀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .love-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(255, 100, 100, 0.6),
                0 0 60px rgba(255, 100, 100, 0.4);
            opacity: 0;
            animation: blink 4s ease-in-out infinite;
            z-index: 100;
            pointer-events: none;
            letter-spacing: 0.2em;
            white-space: nowrap;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div class="love-text">我爱你 何儀</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const codeChars = ['#', '*', '@', '&', '=', '0', '1', '{', '}', '(', ')', '<', '>', '/', '+', '-', '%', '$', '!', '?'];
        const heartSize = Math.min(canvas.width, canvas.height) * 0.35;
        const heartCenterX = canvas.width / 2;
        const heartCenterY = canvas.height / 2;
        const heartChars = [];

        function generateHeartPoints() {
            const points = [];
            for (let angle = 0; angle < Math.PI * 2; angle += 0.02) {
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                points.push({
                    x: heartCenterX + x * heartSize / 17,
                    y: heartCenterY + y * heartSize / 17
                });
            }
            return points;
        }

        function fillHeart() {
            const heartPoints = generateHeartPoints();
            const minX = Math.min(...heartPoints.map(p => p.x));
            const maxX = Math.max(...heartPoints.map(p => p.x));
            const minY = Math.min(...heartPoints.map(p => p.y));
            const maxY = Math.max(...heartPoints.map(p => p.y));

            function isInsideHeart(x, y) {
                let inside = false;
                for (let i = 0, j = heartPoints.length - 1; i < heartPoints.length; j = i++) {
                    const xi = heartPoints[i].x, yi = heartPoints[i].y;
                    const xj = heartPoints[j].x, yj = heartPoints[j].y;
                    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
                        inside = !inside;
                    }
                }
                return inside;
            }

            const step = 12;
            for (let y = minY; y <= maxY; y += step) {
                for (let x = minX; x <= maxX; x += step) {
                    if (isInsideHeart(x, y)) {
                        heartChars.push({
                            x: x,
                            y: y,
                            char: codeChars[Math.floor(Math.random() * codeChars.length)],
                            size: Math.random() * 4 + 10,
                            opacity: Math.random() * 0.3 + 0.7
                        });
                    }
                }
            }
        }

        fillHeart();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.008 + 0.004;
                this.size = Math.random() * 3 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * canvas.height * 0.4 + canvas.height * 0.05;
                this.speed = Math.random() * 4 + 6;
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.2;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.colors = [
                    `hsl(${Math.random() * 60 + 300}, 100%, 70%)`,
                    `hsl(${Math.random() * 60 + 200}, 100%, 70%)`,
                    `hsl(${Math.random() * 40 + 30}, 100%, 70%)`,
                    `hsl(${Math.random() * 30 + 350}, 100%, 70%)`,
                ];
                this.exploded = false;
                this.particles = [];
            }

            update() {
                if (!this.exploded) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.1;
                    if (this.vy >= 0 || this.y <= this.targetY) {
                        this.explode();
                    }
                } else {
                    this.particles.forEach(p => p.update());
                    this.particles = this.particles.filter(p => p.life > 0);
                }
            }

            explode() {
                this.exploded = true;
                for (let i = 0; i < 80; i++) {
                    this.particles.push(new Particle(this.x, this.y, this.colors[Math.floor(Math.random() * this.colors.length)]));
                }
            }

            draw() {
                if (!this.exploded) {
                    ctx.save();
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#fff';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                this.particles.forEach(p => p.draw());
            }
        }

        const fireworks = [];
        let timer = 0;

        function drawHeart() {
            heartChars.forEach(char => {
                ctx.save();
                ctx.font = `${char.size}px 'Courier New', monospace`;
                ctx.fillStyle = `rgba(255, 250, 220, ${char.opacity})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 200, 100, 0.8)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(char.char, char.x, char.y);
                ctx.restore();
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawHeart();

            fireworks.forEach(fw => {
                fw.update();
                fw.draw();
            });

            fireworks.filter(fw => !fw.exploded || fw.particles.length > 0);

            timer++;
            if (timer % 40 === 0) {
                fireworks.push(new Firework());
            }

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>

</html>
